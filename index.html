<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, [Friend's Name]!</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #a1c4fd, #c2e9fb);
            margin: 0;
            padding: 50px;
            overflow: hidden; /* Prevent scrollbars from showing */
        }
        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff4081;
            font-size: 3.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in-out;
        }
        p {
            font-size: 1.8em;
            color: #333;
            margin: 20px 0;
            animation: slideIn 1s ease-in-out;
        }
        .emoji {
            font-size: 2.5em;
            margin: 10px 0;
            animation: bounce 1s infinite;
        }
        .button {
            background-color: #ff4081;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.3s;
            animation: zoomIn 1s ease-in-out;
        }
        .button:hover {
            background-color: #e91e63;
            transform: scale(1.1);
        }
        footer {
            margin-top: 30px;
            font-size: 1.2em;
            color: #666;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        @keyframes zoomIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .confetti {
            position: absolute;
            pointer-events: none;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff4081;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(100vh);
            }
        }
    </style>
</head>
<body>
    <div class="confetti" id="confetti-container"></div>
    <h1>🎉 Happy Birthday, [sourav]! 🎂</h1>
    <p>Wishing you an amazing day filled with fun and joy!</p>
    <div class="emoji">🎈🎁✨</div>
    <a class="button" href="message.html">Click here for a special message!</a>
    <footer>Enjoy your special day! 🎊</footer>

    <script>
        function createConfetti() {
            const confettiContainer = document.getElementById('confetti-container');
            const colors = ['#ff4081', '#ffb3ba', '#ffcccb', '#ffe0b2', '#ffe57f'];
            for (let i = 0; i < 100; i++) {
                const confettiPiece = document.createElement('div');
                confettiPiece.className = 'confetti-piece';
                confettiPiece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confettiPiece.style.left = Math.random() * 100 + 'vw';
                confettiPiece.style.animationDuration = Math.random() * 2 + 3 + 's'; // Random fall duration
                confettiPiece.style.transform = `rotate(${Math.random() * 360}deg)`; // Random rotation
                confettiContainer.appendChild(confettiPiece);
            }
        }

        createConfetti();
    </script>
</body>
</html>
